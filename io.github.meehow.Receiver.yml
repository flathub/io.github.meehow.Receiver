app-id: io.github.meehow.Receiver
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: receiver
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri

modules:
  - name: receiver
    buildsystem: meson
    config-opts:
      - --buildtype=release
    sources:
      - type: archive
        url: https://github.com/meehow/receiver/archive/refs/tags/v0.3.9.tar.gz
        sha256: 8be507195a3f9794c6ccc1fb29a6055c76466a70317c787de4c17532db37b315
