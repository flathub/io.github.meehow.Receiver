app-id: io.github.meehow.Receiver
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: receiver
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri

modules:
  - name: receiver
    buildsystem: meson
    config-opts:
      - --buildtype=release
    sources:
      - type: archive
        url: https://github.com/meehow/receiver/archive/refs/tags/v0.5.0.tar.gz
        sha256: b08ac4f5c96a70a4041ea94a34a0206f1d7d189855622a02b232c2c0c58b4bd0
