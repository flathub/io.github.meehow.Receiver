app-id: io.github.meehow.Receiver
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: receiver
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri

modules:
  - name: receiver
    buildsystem: meson
    config-opts:
      - --buildtype=release
    sources:
      - type: archive
        url: https://github.com/meehow/receiver/archive/refs/tags/v0.3.7.tar.gz
        sha256: efa8ff12686484df3deeb879b1e697373f10556e23625def8acc58ac654f11f8
